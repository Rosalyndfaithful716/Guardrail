name: 'Guardrail Code Scanner'
description: 'Scan code for security issues, performance problems, and AI-generated code anti-patterns'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  target:
    description: 'Directory to scan'
    required: false
    default: '.'
  severity:
    description: 'Minimum severity to report (critical, high, warning, info)'
    required: false
    default: 'warning'
  fail-on:
    description: 'Severity level that causes the action to fail (critical, high, warning, info)'
    required: false
    default: 'high'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Guardrail
      shell: bash
      run: npm install -g @guardrail/cli

    - name: Run Guardrail Scan
      shell: bash
      run: |
        guardrail scan ${{ inputs.target }} \
          --severity ${{ inputs.severity }} \
          --json > guardrail-results.json 2>&1 || true

    - name: Process Results
      shell: bash
      run: |
        node -e "
        const fs = require('fs');
        const results = JSON.parse(fs.readFileSync('guardrail-results.json', 'utf8'));
        const levels = { critical: 0, high: 1, warning: 2, info: 3 };
        const threshold = levels['${{ inputs.fail-on }}'] ?? 1;

        for (const result of results.results || []) {
          for (const v of result.violations || []) {
            const file = v.location.file;
            const line = v.location.line;
            const level = levels[v.severity] <= 1 ? 'error' : 'warning';
            console.log('::' + level + ' file=' + file + ',line=' + line + '::' + v.message + ' [' + v.ruleId + ']');
          }
        }

        const hasFailures = Object.entries(results.bySeverity || {}).some(
          ([sev, count]) => count > 0 && levels[sev] <= threshold
        );

        if (hasFailures) {
          console.log('');
          console.log('Guardrail found issues at or above the \"${{ inputs.fail-on }}\" severity threshold.');
          process.exit(1);
        }
        "
